apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-api
  labels:
    app: sports-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sports-api
  template:
    metadata:
      labels:
        app: sports-api
    spec:
      containers:
      - name: sports-api
        image: sports-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:password@postgres-service:5432/sports_db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: password
        - name: POSTGRES_DB
          value: sports_db
